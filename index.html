<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronal Clone – Tuner & Metronome</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1a1e2c;
            color: #e0e4f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #222838;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #a6b3d0;
        }
        h1 span {
            color: #f0b34b;
            font-weight: 500;
        }
        .tuner-section, .metro-section {
            background: #2a3142;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .tuner-display {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .note-name {
            font-size: 4rem;
            font-weight: 700;
            color: #f0f4ff;
            line-height: 1;
            margin-bottom: 4px;
        }
        .note-freq {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 12px;
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 120px;
            margin: 10px 0;
        }
        #tunerCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #1e2537;
            border-radius: 40px;
        }
        .cents-label {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 500;
            margin-top: -10px;
            color: #bcc9f0;
        }
        .tuning-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 18px 0 8px;
        }
        .tuning-selector button {
            background: #38405a;
            border: none;
            color: #d0daf0;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .tuning-selector button.active {
            background: #f0b34b;
            color: #1a1e2c;
            font-weight: 600;
        }
        .tuning-selector button:hover {
            background: #4b5679;
        }
        .meter-bar {
            width: 100%;
            height: 8px;
            background: #38405a;
            border-radius: 10px;
            margin: 12px 0 5px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            width: 50%;
            background: #f0b34b;
            border-radius: 10px;
            transition: width 0.05s;
        }
        .metro-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        .bpm-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bpm-group label {
            font-weight: 500;
        }
        .bpm-group input[type="range"] {
            width: 140px;
            background: #38405a;
            height: 6px;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        .bpm-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f0b34b;
            cursor: pointer;
        }
        .bpm-value {
            font-size: 1.6rem;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }
        .metro-buttons {
            display: flex;
            gap: 12px;
        }
        .metro-buttons button {
            background: #38405a;
            border: none;
            color: #e0e4f0;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            min-width: 80px;
        }
        .metro-buttons button.active {
            background: #e74c5e;
        }
        .metro-buttons button:active {
            transform: scale(0.95);
        }
        .tap-btn {
            background: #2d354a;
        }
        .time-sig {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a6b3d0;
        }
        .time-sig select {
            background: #38405a;
            border: none;
            color: #e0e4f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .beat-indicator {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 18px 0 0;
        }
        .beat-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #38405a;
            transition: 0.1s;
        }
        .beat-dot.active {
            background: #f0b34b;
            transform: scale(1.2);
        }
        .beat-dot.accent {
            background: #f0b34b;
        }
        .status-msg {
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0.4;
        }
        @media (max-width: 480px) {
            .container { padding: 15px; }
            .note-name { font-size: 3rem; }
            .bpm-group input[type="range"] { width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎸 <span>Chronal</span> · Clone</h1>

    <!-- Tuner -->
    <div class="tuner-section">
        <div class="tuner-display">
            <div class="note-name" id="noteDisplay">--</div>
            <div class="note-freq" id="freqDisplay">0.0 Hz</div>
            <div class="canvas-wrapper">
                <canvas id="tunerCanvas"></canvas>
            </div>
            <div class="cents-label" id="centsDisplay">+0¢</div>
            <div class="meter-bar"><div class="meter-fill" id="meterFill" style="width:50%"></div></div>
            <div class="tuning-selector" id="tuningSelector">
                <button data-tuning="standard" class="active">Standard</button>
                <button data-tuning="dropD">Drop D</button>
                <button data-tuning="openG">Open G</button>
                <button data-tuning="custom">Custom</button>
            </div>
        </div>
    </div>

    <!-- Metronome -->
    <div class="metro-section">
        <div class="metro-controls">
            <div class="bpm-group">
                <label>BPM</label>
                <input type="range" id="bpmSlider" min="30" max="250" value="120">
                <span class="bpm-value" id="bpmDisplay">120</span>
            </div>
            <div class="metro-buttons">
                <button id="metroPlayBtn">▶ Play</button>
                <button id="metroTapBtn" class="tap-btn">👆 Tap</button>
            </div>
        </div>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:10px;">
            <div class="time-sig">
                <label>Time</label>
                <select id="timeSigSelect">
                    <option value="4">4/4</option>
                    <option value="3">3/4</option>
                    <option value="6">6/8</option>
                    <option value="2">2/4</option>
                </select>
            </div>
        </div>
        <div class="beat-indicator" id="beatIndicator"></div>
        <div class="status-msg" id="metroStatus">⏸ Stopped</div>
    </div>
    <div class="footer-note">Open source · pitch detection &amp; metronome</div>
</div>

<script>
    (function(){
        'use strict';

        // -------- Tuner ----------
        const noteDisplay = document.getElementById('noteDisplay');
        const freqDisplay = document.getElementById('freqDisplay');
        const centsDisplay = document.getElementById('centsDisplay');
        const meterFill = document.getElementById('meterFill');
        const canvas = document.getElementById('tunerCanvas');
        const ctx = canvas.getContext('2d');

        // Tuner state
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let source = null;
        let isTunerRunning = false;
        let tuningPreset = 'standard';
        const tunings = {
            standard: { name: 'Standard', notes: ['E2','A2','D3','G3','B3','E4'] },
            dropD:    { name: 'Drop D',  notes: ['D2','A2','D3','G3','B3','E4'] },
            openG:    { name: 'Open G',  notes: ['D2','G2','D3','G3','B3','D4'] },
            custom:   { name: 'Custom',  notes: ['E2','A2','D3','G3','B3','E4'] } // editable via console
        };
        // Note frequencies (12-TET)
        const noteFreqs = {
            'C0':16.35,'C#0':17.32,'D0':18.35,'D#0':19.45,'E0':20.60,'F0':21.83,'F#0':23.12,'G0':24.50,'G#0':25.96,'A0':27.50,'A#0':29.14,'B0':30.87,
            'C1':32.70,'C#1':34.65,'D1':36.71,'D#1':38.89,'E1':41.20,'F1':43.65,'F#1':46.25,'G1':49.00,'G#1':51.91,'A1':55.00,'A#1':58.27,'B1':61.74,
            'C2':65.41,'C#2':69.30,'D2':73.42,'D#2':77.78,'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,'A#2':116.54,'B2':123.47,
            'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
            'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
            'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,
            'C6':1046.50,'C#6':1108.73,'D6':1174.66,'D#6':1244.51,'E6':1318.51,'F6':1396.91,'F#6':1479.98,'G6':1567.98,'G#6':1661.22,'A6':1760.00,'A#6':1864.66,'B6':1975.53
        };
        const noteNames = Object.keys(noteFreqs).sort((a,b)=>noteFreqs[a]-noteFreqs[b]);

        // Resize canvas
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width || 600;
            const h = rect.height || 120;
            canvas.width = w * devicePixelRatio;
            canvas.height = h * devicePixelRatio;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(devicePixelRatio, devicePixelRatio);
            // store logical size for drawing
            canvas._w = w;
            canvas._h = h;
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 50);

        // Pitch detection (autocorrelation)
        function getPitch(buffer, sampleRate) {
            const len = buffer.length;
            // find the best lag using autocorrelation
            let bestLag = -1;
            let bestCorr = 0;
            const minLag = Math.floor(sampleRate / 2000); // 2000 Hz max
            const maxLag = Math.floor(sampleRate / 50);   // 50 Hz min
            if (maxLag < minLag) return -1;

            // only use first 2048 samples to keep it fast
            const limit = Math.min(len, 4096);
            const buf = buffer.subarray(0, limit);

            for (let lag = minLag; lag < maxLag && lag < limit; lag++) {
                let corr = 0;
                for (let i = 0; i < limit - lag; i++) {
                    corr += buf[i] * buf[i + lag];
                }
                // Normalize by energy of the slice
                let energy = 0;
                for (let i = 0; i < limit - lag; i++) {
                    energy += buf[i] * buf[i] + buf[i+lag]*buf[i+lag];
                }
                if (energy === 0) continue;
                corr = corr / (energy * 0.5);
                if (corr > bestCorr) {
                    bestCorr = corr;
                    bestLag = lag;
                }
            }
            if (bestLag < 0) return -1;
            const freq = sampleRate / bestLag;
            // refine by parabolic interpolation (optional)
            return freq;
        }

        function noteFromFreq(freq) {
            if (freq < 20) return null;
            let closestNote = noteNames[0];
            let closestDist = Infinity;
            for (let n of noteNames) {
                const f = noteFreqs[n];
                const dist = Math.abs(f - freq);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestNote = n;
                }
            }
            const refFreq = noteFreqs[closestNote];
            const cents = 1200 * Math.log2(freq / refFreq);
            return { note: closestNote, freq: refFreq, cents: cents, detectedFreq: freq };
        }

        // Tuner update loop
        let tunerRAF = null;
        function updateTuner() {
            if (!isTunerRunning) return;
            if (!analyser) {
                tunerRAF = requestAnimationFrame(updateTuner);
                return;
            }
            analyser.getFloatTimeDomainData(dataArray);
            const freq = getPitch(dataArray, audioContext.sampleRate);
            if (freq > 0) {
                const result = noteFromFreq(freq);
                if (result) {
                    noteDisplay.textContent = result.note;
                    freqDisplay.textContent = result.detectedFreq.toFixed(1) + ' Hz';
                    let cents = result.cents;
                    // clamp for display
                    const displayCents = Math.round(cents);
                    centsDisplay.textContent = (displayCents > 0 ? '+' : '') + displayCents + '¢';
                    // meter fill (0-100) centered at 50
                    const normalized = 50 + (cents / 50) * 50; // -50..+50 => 0..100
                    const clamped = Math.min(100, Math.max(0, normalized));
                    meterFill.style.width = clamped + '%';
                    // color
                    if (Math.abs(cents) < 3) {
                        meterFill.style.background = '#6fcf97';
                        centsDisplay.style.color = '#6fcf97';
                    } else if (Math.abs(cents) < 10) {
                        meterFill.style.background = '#f2c94a';
                        centsDisplay.style.color = '#f2c94a';
                    } else {
                        meterFill.style.background = '#eb5757';
                        centsDisplay.style.color = '#eb5757';
                    }
                    // draw needle on canvas
                    drawNeedle(cents);
                } else {
                    noteDisplay.textContent = '--';
                    freqDisplay.textContent = '0.0 Hz';
                    centsDisplay.textContent = '—';
                    meterFill.style.width = '50%';
                    meterFill.style.background = '#38405a';
                    centsDisplay.style.color = '#bcc9f0';
                    drawNeedle(0);
                }
            } else {
                noteDisplay.textContent = '--';
                freqDisplay.textContent = '0.0 Hz';
                centsDisplay.textContent = '—';
                meterFill.style.width = '50%';
                meterFill.style.background = '#38405a';
                centsDisplay.style.color = '#bcc9f0';
                drawNeedle(0);
            }
            tunerRAF = requestAnimationFrame(updateTuner);
        }

        function drawNeedle(cents) {
            const w = canvas._w || 600;
            const h = canvas._h || 120;
            ctx.clearRect(0, 0, w, h);
            // background
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, '#eb5757');
            grad.addColorStop(0.45, '#f2c94a');
            grad.addColorStop(0.5, '#6fcf97');
            grad.addColorStop(0.55, '#f2c94a');
            grad.addColorStop(1, '#eb5757');
            ctx.fillStyle = grad;
            ctx.roundRect(10, h/2 - 10, w-20, 20, 10);
            ctx.fill();

            // tick marks
            ctx.fillStyle = '#ffffff66';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            for (let i = -4; i <= 4; i++) {
                const x = w/2 + i * (w-40)/10;
                ctx.fillRect(x-1, h/2 - 20, 2, 8);
                if (i === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x-2, h/2 - 22, 4, 12);
                }
                if (i % 2 === 0) {
                    ctx.fillStyle = '#ffffff88';
                    ctx.fillText((i*10) + '¢', x, h/2 - 28);
                }
            }

            // needle
            const xPos = w/2 + (cents / 50) * (w-40)/2;
            ctx.beginPath();
            ctx.moveTo(xPos, h/2 + 18);
            ctx.lineTo(xPos-8, h/2 - 16);
            ctx.lineTo(xPos+8, h/2 - 16);
            ctx.closePath();
            ctx.fillStyle = '#f0f4ff';
            ctx.shadowColor = '#00000080';
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;

            // center dot
            ctx.beginPath();
            ctx.arc(w/2, h/2, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#f0f4ff';
            ctx.fill();
        }

        // roundRect polyfill for canvas if needed
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                this.closePath();
                return this;
            };
        }

        // Start tuner
        async function startTuner() {
            if (isTunerRunning) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 4096;
                analyser.smoothingTimeConstant = 0.8;
                source.connect(analyser);
                dataArray = new Float32Array(analyser.fftSize);
                isTunerRunning = true;
                updateTuner();
            } catch (err) {
                alert('Could not access microphone: ' + err.message);
            }
        }

        // Stop tuner (cleanup)
        function stopTuner() {
            isTunerRunning = false;
            if (tunerRAF) cancelAnimationFrame(tunerRAF);
            if (source) {
                try { source.disconnect(); } catch(e) {}
                source = null;
            }
            if (analyser) analyser = null;
            if (audioContext && audioContext.state !== 'closed') {
                // we keep context alive for metronome
            }
            noteDisplay.textContent = '--';
            freqDisplay.textContent = '0.0 Hz';
            centsDisplay.textContent = '—';
            meterFill.style.width = '50%';
            meterFill.style.background = '#38405a';
            centsDisplay.style.color = '#bcc9f0';
            drawNeedle(0);
        }

        // Tuning selection
        document.getElementById('tuningSelector').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const tuning = btn.dataset.tuning;
            if (!tuning) return;
            document.querySelectorAll('#tuningSelector button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tuningPreset = tuning;
            // For custom, we could prompt, but we'll just keep standard
            if (tuning === 'custom') {
                const notes = prompt('Enter custom tuning notes (space separated), e.g. D2 A2 D3 G3 B3 D4', 'E2 A2 D3 G3 B3 E4');
                if (notes) {
                    const parts = notes.trim().split(/\s+/);
                    if (parts.length === 6) {
                        tunings.custom.notes = parts;
                    } else {
                        alert('Please enter exactly 6 notes.');
                    }
                }
            }
            // No other action needed; tuner just shows note names anyway
        });

        // -------- Metronome ----------
        let metroInterval = null;
        let metroRunning = false;
        let metroBPM = 120;
        let metroBeats = 4; // beats per measure
        let metroCurrentBeat = 0;
        let metroNextTickTime = 0;
        let metroTimeout = null;

        const bpmSlider = document.getElementById('bpmSlider');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const timeSigSelect = document.getElementById('timeSigSelect');
        const metroPlayBtn = document.getElementById('metroPlayBtn');
        const metroTapBtn = document.getElementById('metroTapBtn');
        const beatIndicator = document.getElementById('beatIndicator');
        const metroStatus = document.getElementById('metroStatus');

        // Audio for metronome clicks
        let clickAudioCtx = null;

        function getClickAudioContext() {
            if (!clickAudioCtx) {
                clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return clickAudioCtx;
        }

        function playClick(accent) {
            try {
                const ctx = getClickAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = accent ? 1000 : 800;
                gain.gain.value = 0.5;
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.05);
                // short envelope
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            } catch(e) { /* ignore */ }
        }

        function updateBeatIndicators(beat) {
            const dots = beatIndicator.children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove('active');
                if (i === beat) {
                    dots[i].classList.add('active');
                }
            }
        }

        function buildBeatIndicators(beats) {
            beatIndicator.innerHTML = '';
            for (let i = 0; i < beats; i++) {
                const dot = document.createElement('div');
                dot.className = 'beat-dot';
                if (i === 0) dot.classList.add('accent');
                beatIndicator.appendChild(dot);
            }
        }

        function startMetronome() {
            if (metroRunning) return;
            const bpm = parseInt(bpmSlider.value);
            metroBPM = bpm;
            const beats = parseInt(timeSigSelect.value);
            metroBeats = beats;
            buildBeatIndicators(beats);
            metroCurrentBeat = 0;
            metroRunning = true;
            metroPlayBtn.textContent = '⏹ Stop';
            metroPlayBtn.classList.add('active');
            metroStatus.textContent = '▶ Playing';

            // schedule ticks
            const interval = 60 / metroBPM;
            let nextTime = getClickAudioContext().currentTime + 0.05;
            scheduleTick(nextTime, interval);
        }

        function scheduleTick(time, interval) {
            if (!metroRunning) return;
            const ctx = getClickAudioContext();
            const beat = metroCurrentBeat;
            const accent = (beat === 0);
            // play click
            playClick(accent);
            updateBeatIndicators(beat);
            // advance beat
            metroCurrentBeat = (beat + 1) % metroBeats;
            // schedule next
            const nextTime = time + interval;
            const now = ctx.currentTime;
            // if nextTime is in the past, adjust
            const delay = Math.max(0, nextTime - now);
            metroTimeout = setTimeout(() => {
                scheduleTick(nextTime, interval);
            }, delay * 1000);
        }

        function stopMetronome() {
            metroRunning = false;
            if (metroTimeout) {
                clearTimeout(metroTimeout);
                metroTimeout = null;
            }
            metroPlayBtn.textContent = '▶ Play';
            metroPlayBtn.classList.remove('active');
            metroStatus.textContent = '⏸ Stopped';
            // reset indicators
            const dots = beatIndicator.children;
            for (let d of dots) d.classList.remove('active');
        }

        function toggleMetronome() {
            if (metroRunning) {
                stopMetronome();
            } else {
                // ensure audio context is running
                const ctx = getClickAudioContext();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                startMetronome();
            }
        }

        // BPM slider
        bpmSlider.addEventListener('input', function() {
            const val = parseInt(this.value);
            bpmDisplay.textContent = val;
            if (metroRunning) {
                // restart with new BPM
                stopMetronome();
                // re-start after a tiny delay to avoid race
                setTimeout(() => {
                    startMetronome();
                }, 50);
            }
        });

        // Time signature change
        timeSigSelect.addEventListener('change', function() {
            const beats = parseInt(this.value);
            metroBeats = beats;
            buildBeatIndicators(beats);
            if (metroRunning) {
                // restart
                stopMetronome();
                setTimeout(() => {
                    startMetronome();
                }, 50);
            }
        });

        // Tap tempo
        let tapTimes = [];
        metroTapBtn.addEventListener('click', function() {
            const now = performance.now();
            tapTimes.push(now);
            if (tapTimes.length > 4) tapTimes.shift();
            if (tapTimes.length >= 2) {
                const diffs = [];
                for (let i = 1; i < tapTimes.length; i++) {
                    diffs.push(tapTimes[i] - tapTimes[i-1]);
                }
                const avg = diffs.reduce((a,b)=>a+b,0) / diffs.length;
                if (avg > 0) {
                    const bpm = Math.round(60000 / avg);
                    if (bpm >= 30 && bpm <= 250) {
                        bpmSlider.value = bpm;
                        bpmDisplay.textContent = bpm;
                        if (metroRunning) {
                            stopMetronome();
                            setTimeout(() => startMetronome(), 50);
                        }
                    }
                }
            }
        });

        metroPlayBtn.addEventListener('click', toggleMetronome);

        // Initial beat indicators
        buildBeatIndicators(4);

        // -------- Auto-start tuner on page load ----------
        // We'll start the tuner automatically after user gesture (click on page)
        document.addEventListener('click', function initAudio() {
            startTuner();
            // Also resume metronome audio context if needed
            getClickAudioContext().resume().catch(()=>{});
            document.removeEventListener('click', initAudio);
        }, { once: true });

        // Also if user taps any button, ensure tuner is running
        document.addEventListener('click', function() {
            if (!isTunerRunning) {
                startTuner();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            stopTuner();
            stopMetronome();
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close();
            }
            if (clickAudioCtx && clickAudioCtx.state !== 'closed') {
                clickAudioCtx.close();
            }
        });

        console.log('Chronal Clone loaded – enjoy!');
    })();
</script>
</body>
</html>
